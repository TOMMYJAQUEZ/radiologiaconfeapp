<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Radiología con Fe - Aplicación educativa para aprendizaje de radiología con gamificación">
    <meta name="keywords" content="radiología, educación, quiz, gamificación, medicina">
    <meta name="theme-color" content="#FFD700">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Radiología con Fe">
    <meta property="og:description" content="Fe que guía, Ciencia que transforma">
    <meta property="og:type" content="website">
    
    <title>Radiología con Fe - Aprende Radiología con Gamificación</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/favicon.ico">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="../css/design-system.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <!-- Root App -->
    <div id="app">
        <!-- Splash/Loading -->
        <div id="splash" class="splash-screen">
            <div class="splash-content">
                <img src="/assets/images/logo.svg" alt="Radiología con Fe Logo" class="splash-logo">
                <h1>Radiología con Fe</h1>
                <p>Fe que guía, Ciencia que transforma</p>
                <div class="spinner"></div>
            </div>
        </div>
        
        <!-- Main App Container -->
        <div id="main-container" style="display: none;">
            <!-- Header/Navigation -->
            <header id="header" class="header"></header>
            
            <!-- Main Content -->
            <main id="main-content" class="main-content"></main>
            
            <!-- Bottom Navigation (Mobile) -->
            <nav id="bottom-nav" class="bottom-nav"></nav>
            
            <!-- Modals Container -->
            <div id="modals-container" class="modals-container"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js"></script>
    
    <!-- App Scripts -->
    <script src="../../config/firebase-config.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
